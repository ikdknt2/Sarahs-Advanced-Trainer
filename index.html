
<!DOCTYPE html>
<html>
<body>

<svg id="skewb" width="600" height="600" viewBox="-300 -300 600 600"></svg>

<script>

const COS60 = 0.5
const SIN60 = 0.86602540378
const COS30 = 0.86602540378
const SIN30 = 0.5
 
function rotate(x,y,deg){

 const cx = 0
 const cy = -100

 const r = deg*Math.PI/180
 const c = Math.cos(r)
 const s = Math.sin(r)

 let x1 = x - cx
 let y1 = y - cy

 let x2 = x1*c - y1*s
 let y2 = x1*s + y1*c

 return [
  x2 + cx,
  y2 + cy
 ]

}

function iso(x,y){
 return [
  x + COS60*y,
  SIN60*y
 ]
}


function tilt(x,y){
 return [
  x*COS30 + y*SIN30,
  -x*SIN30 + y*COS30
 ]
}


function transform(x,y,rot){

 let [x1,y1] = rotate(x,y,rot)
 let [x2,y2] = iso(x1,y1)
 let [x3,y3] = tilt(x2,y2)

 return [x3,y3]
}


// 描画だけ
function poly(points,color,rot){

 const svg = document.getElementById("skewb")

 const pts = points.map(([x,y])=>{
  let [X,Y] = transform(x,y,rot)
  return X + "," + (-Y)
 }).join(" ")

 const el = document.createElementNS(
  "http://www.w3.org/2000/svg",
  "polygon"
 )

 el.setAttribute("points",pts)
 el.setAttribute("fill",color)
 el.setAttribute("stroke","black")

 svg.appendChild(el)

}


// 1面の形
const center = [[0,100],[-100,0],[0,-100],[100,0]]

const tris = [
 [[-100,100],[0,100],[-100,0]],
 [[100,100],[0,100],[100,0]],
 [[-100,-100],[0,-100],[-100,0]],
 [[100,-100],[0,-100],[100,0]]
]


function drawFace(rot,color){

 poly(center,color,rot)

 for(let i=0;i<4;i++){
  poly(tris[i],color,rot)
 }

}


// 描画
drawFace(0,"white")
drawFace(120,"red")
drawFace(240,"green")

</script>

</body>
</html>
