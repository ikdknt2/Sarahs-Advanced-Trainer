
<!DOCTYPE html>
<html>
<body>

<svg id="skewb" width="600" height="600" viewBox="-300 -300 600 600"></svg>

<script>

const COS60 = 0.5
const SIN60 = 0.86602540378
const COS30 = 0.86602540378
const SIN30 = 0.5


function iso(x,y){
 return [
  x + COS60*y,
  SIN60*y
 ]
}

function tilt(x,y){
 return [
  x*COS30 + y*SIN30,
  -x*SIN30 + y*COS30
 ]
}

function transform(x,y){
 let [x1,y1] = iso(x,y)
 let [x2,y2] = tilt(x1,y1)
 return [x2,y2]
}


function poly(points,color,dx,dy){

 const svg = document.getElementById("skewb")

 const pts = points.map(([x,y])=>{

  let [X,Y] = transform(x,y)

  return (X+dx) + "," + (-(Y+dy))

 }).join(" ")

 const el = document.createElementNS(
  "http://www.w3.org/2000/svg",
  "polygon"
 )

 el.setAttribute("points",pts)
 el.setAttribute("fill",color)
 el.setAttribute("stroke","black")

 svg.appendChild(el)

}


const center = [[0,100],[-100,0],[0,-100],[100,0]]

const tris = [
 [[-100,100],[0,100],[-100,0]],
 [[100,100],[0,100],[100,0]],
 [[-100,-100],[0,-100],[-100,0]],
 [[100,-100],[0,-100],[100,0]]
]


function drawFace(color,dx,dy){

 poly(center,color,dx,dy)

 for(let i=0;i<4;i++){
  poly(tris[i],color,dx,dy)
 }

}


// U
drawFace("white",0,0)

// R
drawFace("red",200,0)

// F
drawFace("green",-200,0)

</script>

</body>
</html>
