
<!DOCTYPE html>
<html>
<body>

<svg id="skewb" width="600" height="600" viewBox="-300 -300 600 600"></svg>

<script>

function poly(points,color,dx,dy){

 const svg = document.getElementById("skewb")

 const pts = points.map(([x,y])=>{
  return (x+dx) + "," + (-(y+dy))
 }).join(" ")

 const el = document.createElementNS(
  "http://www.w3.org/2000/svg",
  "polygon"
 )

 el.setAttribute("points",pts)
 el.setAttribute("fill",color)
 el.setAttribute("stroke","black")

 svg.appendChild(el)

}


const center = [[0,100],[-100,0],[0,-100],[100,0]]

const tris = [
 [[-100,100],[0,100],[-100,0]],
 [[100,100],[0,100],[100,0]],
 [[-100,-100],[0,-100],[-100,0]],
 [[100,-100],[0,-100],[100,0]]
]


function drawFace(color,dx,dy){

 poly(center,color,dx,dy)

 for(let i=0;i<4;i++){
  poly(tris[i],color,dx,dy)
 }

}


// U
drawFace("white",0,0)

// R
drawFace("red",173,100)

// F
drawFace("green",-173,100)

</script>

</body>
</html>
